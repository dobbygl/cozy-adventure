name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lint runs in warn mode (informational; does not fail the build yet).
      - run: pnpm -r run lint
      # typecheck, test and build are hard gates across all workspaces.
      - run: pnpm -r run typecheck
      - run: pnpm -r run test
      - run: pnpm -r run build
